<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BlackCorp Backbone Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Mono", monospace; }
    body { margin: 0; background:#050608; color:#e5e5e5; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid #222; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:1.1rem; letter-spacing:0.08em; text-transform:uppercase; }
    header span { font-size:0.8rem; color:#8f8f8f; }
    main { display:flex; flex-wrap:wrap; padding:1rem; gap:1rem; }
    section { border:1px solid #222; padding:0.75rem; border-radius:4px; background:#0b0c10; flex:1 1 280px; min-width:260px; }
    h2 { margin:0 0 0.5rem 0; font-size:0.9rem; text-transform:uppercase; letter-spacing:0.08em; color:#c5c5ff; }
    .pill { display:inline-block; padding:0.1rem 0.4rem; border-radius:999px; font-size:0.7rem; margin-right:0.25rem; }
    .pill-ac { background:#1b2838; color:#7fd0ff; }
    .pill-dc { background:#182818; color:#9dff9d; }
    .pill-rf { background:#281828; color:#ff9df2; }
    .pill-opt { background:#281f18; color:#ffc89d; }
    .pill-kin { background:#182428; color:#9df5ff; }
    .pill-gas { background:#282218; color:#ffe39d; }
    .pill-adv { background:#281818; color:#ff7f7f; }
    .node-list { max-height:220px; overflow:auto; font-size:0.8rem; }
    .node { padding:0.35rem 0.25rem; border-bottom:1px solid #151515; cursor:pointer; }
    .node:hover { background:#11141b; }
    .
